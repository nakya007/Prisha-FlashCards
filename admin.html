<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Grammar School Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:#0a0a1a;color:#e8eaf6;min-height:100vh;overflow-x:hidden;}

/* ── Sign-in screen ── */
.signin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.signin-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px 28px;width:100%;max-width:380px;text-align:center;}
.signin-logo{font-size:48px;margin-bottom:12px;}
.signin-title{font-size:22px;font-weight:900;margin-bottom:4px;}
.signin-sub{font-size:13px;opacity:0.45;margin-bottom:28px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:14px;border:none;background:#fff;color:#222;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:box-shadow 0.15s,transform 0.12s;box-shadow:0 2px 16px rgba(0,0,0,0.35);}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 4px 22px rgba(0,0,0,0.45);}
.btn-google svg{width:20px;height:20px;flex-shrink:0;}
.signin-err{color:#ef9a9a;font-size:13px;margin-top:14px;min-height:18px;}
.back-home{margin-top:18px;color:rgba(255,255,255,0.3);font-size:13px;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit;}
.back-home:hover{color:rgba(255,255,255,0.55);}

/* ── Dashboard ── */
#dashboard{display:none;padding:24px;max-width:900px;margin:0 auto;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.dash-title{font-size:22px;font-weight:900;}
.dash-sub{font-size:13px;opacity:0.45;margin-top:2px;}
.btn-sm{padding:9px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:background 0.15s,transform 0.1s;}
.btn-sm:hover{transform:translateY(-1px);}
.btn-signout{background:rgba(255,255,255,0.07);color:#e8eaf6;border:1px solid rgba(255,255,255,0.12);}

/* Summary stats bar */
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.sum-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:14px;text-align:center;}
.sum-val{font-size:26px;font-weight:900;}
.sum-lbl{font-size:11px;opacity:0.45;margin-top:3px;}

/* Student cards */
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.student-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:20px;position:relative;}
.student-card:hover{border-color:rgba(255,255,255,0.18);}
.stu-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.stu-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stu-name{font-size:17px;font-weight:900;}
.stu-since{font-size:11px;opacity:0.4;margin-top:1px;}
.stu-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.stu-stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 6px;text-align:center;}
.stu-stat-val{font-size:16px;font-weight:900;}
.stu-stat-lbl{font-size:9px;opacity:0.45;margin-top:2px;text-transform:uppercase;}
.progress-bar-wrap{margin-bottom:12px;}
.progress-bar-label{display:flex;justify-content:space-between;font-size:11px;opacity:0.55;margin-bottom:4px;}
.progress-bar-track{background:rgba(255,255,255,0.08);border-radius:99px;height:6px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#42a5f5,#1565c0);transition:width 0.6s ease;}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;min-height:24px;}
.badge-chip{background:rgba(249,212,35,0.12);border:1px solid rgba(249,212,35,0.25);color:#ffd54f;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
.last-active{font-size:11px;opacity:0.35;margin-bottom:12px;}
.report-btn{width:100%;padding:10px;border-radius:12px;border:none;background:linear-gradient(90deg,#1565c0,#42a5f5);color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.15s,transform 0.12s;}
.report-btn:hover{opacity:0.9;transform:translateY(-1px);}

/* Strengths/Weaknesses */
.sw-section{margin-bottom:10px;}
.sw-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;opacity:0.5;margin-bottom:4px;}
.sw-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag-good{background:rgba(129,199,132,0.12);border:1px solid rgba(129,199,132,0.25);color:#a5d6a7;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.tag-weak{background:rgba(239,154,154,0.12);border:1px solid rgba(239,154,154,0.25);color:#ef9a9a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.tag-none{font-size:10px;opacity:0.3;font-style:italic;}

/* Empty/loading states */
.empty-state{text-align:center;padding:48px 20px;opacity:0.35;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.loading-spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#42a5f5;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Report modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;justify-content:center;align-items:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#12122a;border-radius:24px;padding:32px 28px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:20px;font-weight:900;margin-bottom:4px;}
.modal-sub{font-size:12px;opacity:0.4;margin-bottom:20px;}
.report-section{margin-bottom:18px;}
.report-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;opacity:0.5;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:6px;}
.report-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.report-val{font-weight:700;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-actions .btn-sm{flex:1;padding:12px;}
.btn-print{background:linear-gradient(90deg,#1565c0,#42a5f5);color:#fff;}
.btn-close{background:rgba(255,255,255,0.07);color:#e8eaf6;border:1px solid rgba(255,255,255,0.12);}

/* Invite code cards */
.code-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.code-card.inactive{opacity:0.45;}
.code-pill{font-size:16px;font-weight:900;letter-spacing:1px;font-family:'Courier New',monospace;}
.code-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:3px;display:inline-block;}
.code-active{background:rgba(129,199,132,0.15);color:#a5d6a7;border:1px solid rgba(129,199,132,0.3);}
.code-inactive{background:rgba(239,154,154,0.12);color:#ef9a9a;border:1px solid rgba(239,154,154,0.25);}
.code-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-code{padding:6px 11px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.15s;}
.btn-deactivate{background:rgba(239,154,154,0.12);color:#ef9a9a;border:1px solid rgba(239,154,154,0.25);}
.btn-activate{background:rgba(129,199,132,0.12);color:#a5d6a7;border:1px solid rgba(129,199,132,0.25);}
.btn-delete{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);}
.code-err{color:#ef9a9a;font-size:12px;margin-top:8px;}

@media(max-width:600px){
  .summary-bar{grid-template-columns:repeat(2,1fr);}
  .students-grid{grid-template-columns:1fr;}
  .dash-header{flex-direction:column;align-items:flex-start;}
}

/* ── Habit calendar modal ── */
.habit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:300;justify-content:center;align-items:flex-end;}
.habit-overlay.open{display:flex;}
.habit-sheet{background:#12122a;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;animation:slideUp 0.28s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.habit-name{font-size:18px;font-weight:900;color:#fff;margin-bottom:4px;}
.habit-streak-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.habit-pill{border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;}
.habit-pill-fire{background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;}
.habit-pill-best{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);color:#c4b5fd;}
.habit-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.habit-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.5);}
.habit-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.cal-day-hdr{font-size:9px;font-weight:700;color:rgba(255,255,255,0.3);text-align:center;padding:2px 0;}
.cal-day{aspect-ratio:1;border-radius:4px;cursor:default;position:relative;}
.cal-day.cal-none{background:rgba(255,255,255,0.05);}
.cal-day.cal-partial{background:rgba(251,191,36,0.35);}
.cal-day.cal-full{background:rgba(74,222,128,0.45);}
.cal-day.cal-today{outline:2px solid rgba(255,255,255,0.35);}
.cal-day.cal-future{background:transparent;}
.habit-close{width:100%;padding:13px;border-radius:14px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:6px;}
.habit-close:hover{background:rgba(255,255,255,0.1);}
.habit-section-lbl{font-size:10px;font-weight:800;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.student-card.suspended{opacity:0.65;border-color:rgba(251,191,36,0.35);}
.suspended-banner{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;color:#fbbf24;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
</style>
</head>
<body>

<!-- ══ SIGN-IN ══ -->
<div class="signin-wrap" id="signinWrap">
  <div class="signin-box">
    <div class="signin-logo">🔐</div>
    <div class="signin-title">Admin Login</div>
    <div class="signin-sub">Grammar School Prep</div>
    <button class="btn-google" onclick="adminSignIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="signin-err" id="signinErr"></div>
    <button class="back-home" onclick="window.location.href='index.html'">← Back to site</button>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-title">📊 Student Dashboard</div>
      <div class="dash-sub" id="dashSub">Loading students...</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-sm btn-signout" onclick="refreshStudents()">🔄 Refresh</button>
      <button class="btn-sm btn-signout" onclick="goToSite()">👁 View Site</button>
      <button class="btn-sm btn-signout" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="summary-bar" id="summaryBar">
    <div class="sum-card"><div class="sum-val" id="sumStudents">—</div><div class="sum-lbl">Students</div></div>
    <div class="sum-card"><div class="sum-val" id="sumActive">—</div><div class="sum-lbl">Active Today</div></div>
    <div class="sum-card"><div class="sum-val" id="sumCards">—</div><div class="sum-lbl">Cards Mastered</div></div>
    <div class="sum-card"><div class="sum-val" id="sumXP">—</div><div class="sum-lbl">Total XP Earned</div></div>
  </div>

  <div class="students-grid" id="studentsGrid">
    <div class="empty-state"><div class="loading-spinner"></div></div>
  </div>

  <!-- Invite Codes -->
  <div class="section-header" style="margin-top:32px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <div>
      <div class="dash-title" style="font-size:18px;">🔑 Invite Codes</div>
      <div class="dash-sub">Students enter these codes to join the site</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input id="newCodeInput" type="text" placeholder="New code e.g. SUMMER25"
        style="padding:9px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#e8eaf6;font-size:13px;font-family:'Nunito',sans-serif;font-weight:700;outline:none;text-transform:uppercase;width:190px;"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')addInviteCode()">
      <button class="btn-sm" onclick="addInviteCode()"
        style="background:linear-gradient(90deg,#1565c0,#42a5f5);color:#fff;">+ Add Code</button>
    </div>
  </div>
  <div id="codesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;">
    <div class="empty-state"><div class="loading-spinner"></div></div>
  </div>
</div>

<!-- ══ REPORT MODAL ══ -->
<div class="modal-overlay" id="reportModal" onclick="closeReportModal(event)">
  <div class="modal-box" id="reportBox">
    <div class="modal-title" id="reportTitle">Progress Report</div>
    <div class="modal-sub" id="reportSub"></div>
    <div id="reportContent"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-print" onclick="printReport()">🖨 Print / Save PDF</button>
      <button class="btn-sm btn-close" onclick="document.getElementById('reportModal').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<script>
// ── Helpers ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDate(d) {
  if (!d) return '—';
  const dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}
// ── Firebase ────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCEyADr23BV0nASX_RlTfQR-Ewt0XMFYJ8",
  authDomain: "grammar-school-flash-cards.firebaseapp.com",
  projectId: "grammar-school-flash-cards",
  storageBucket: "grammar-school-flash-cards.firebasestorage.app",
  messagingSenderId: "699212561669",
  appId: "1:699212561669:web:1fa5b71c77b178fb084b6c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── Config ──────────────────────────────────────────────────────
const ADMIN_EMAIL = 'grammarschooladmin@gmail.com';

const THEME_EMOJIS = {
  space:'🚀', library:'📚', ocean:'🌊', candy:'🍭', jungle:'🌿', superhero:'⚡'
};
const THEME_COLORS = {
  space:'#1a237e', library:'#1b5e20', ocean:'#003954',
  candy:'#6a1b9a', jungle:'#33691e', superhero:'#b71c1c'
};

const TOPIC_SUBJECT = {}; // Could be extended to tag topics by subject

// ── Auth (Google Sign-In via Firebase) ──────────────────────────────
const auth = firebase.auth();
const _isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// Handle redirect result on page load (for mobile flow)
firebase.auth().getRedirectResult().then(result => {
  // onAuthStateChanged handles the actual sign-in
}).catch(err => {
  if (err.code !== 'auth/no-auth-event') {
    const errEl = document.getElementById('signinErr');
    if (errEl) errEl.textContent = '❌ Sign-in failed: ' + err.message;
  }
});

firebase.auth().onAuthStateChanged(user => {
  if (user && user.email === ADMIN_EMAIL) {
    showDashboard();
  } else if (user) {
    // Signed in but wrong account
    document.getElementById('signinErr').textContent = '❌ ' + user.email + ' is not authorised. Please use grammarschooladmin@gmail.com.';
    auth.signOut();
  }
});

function adminSignIn() {
  const errEl = document.getElementById('signinErr');
  errEl.textContent = 'Signing in…';
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ login_hint: ADMIN_EMAIL });
  if (_isMobile) {
    // Redirect is more reliable on iOS Safari (avoids sessionStorage popup issues)
    auth.signInWithRedirect(provider);
  } else {
    auth.signInWithPopup(provider).catch(err => {
      errEl.textContent = '❌ Sign-in failed: ' + err.message;
    });
  }
}

function signOut() {
  auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('signinWrap').style.display = 'flex';
}

function goToSite() {
  localStorage.setItem('gsc_admin_preview', '1');
  window.open('index.html?preview=1', '_blank');
}

// ── Dashboard ─────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('signinWrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStudents();
  loadInviteCodes();
}

async function loadStudents() {
  const grid = document.getElementById('studentsGrid');
  grid.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div></div>';

  try {
    const snap = await db.collection('users').orderBy('lastActive', 'desc').get();
    const students = [];
    snap.forEach(doc => students.push({ id: doc.id, ...doc.data() }));

    updateSummaryBar(students);

    if (!students.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><div>No students yet.</div></div>';
      document.getElementById('dashSub').textContent = 'No students have joined yet.';
      return;
    }

    document.getElementById('dashSub').textContent = students.length + ' student' + (students.length !== 1 ? 's' : '') + ' registered';
    grid.innerHTML = '';
    students.forEach(s => grid.appendChild(buildStudentCard(s)));

  } catch(e) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>Failed to load. Check your connection.</div></div>';
    console.error(e);
  }
}

function refreshStudents() { loadStudents(); }

function togglePin(id, pin) {
  const el = document.getElementById('pin_' + id);
  const btn = document.getElementById('pinBtn_' + id);
  if (!el || !btn) return;
  if (el.textContent === '••••') { el.textContent = pin; btn.textContent = 'Hide'; }
  else { el.textContent = '••••'; btn.textContent = 'Show'; }
}

async function resetPin(id, name) {
  const newPin = prompt(`Reset PIN for ${name}\n\nEnter a new 4-digit PIN (or leave blank to cancel):`);
  if (!newPin) return;
  const clean = newPin.trim().replace(/\D/g, '');
  if (clean.length !== 4) { alert('PIN must be exactly 4 digits.'); return; }
  try {
    await db.collection('users').doc(id).update({ pin: clean });
    alert(`✅ PIN for ${name} has been reset to ${clean}`);
    loadStudents();
  } catch(e) {
    alert('Failed to reset PIN: ' + e.message);
  }
}

async function deleteStudent(id, name) {
  if (!confirm(`Delete ${name}'s profile and ALL their progress? This cannot be undone.`)) return;
  try {
    // Delete dailyLogs subcollection first
    const logs = await db.collection('users').doc(id).collection('dailyLogs').get();
    const batch = db.batch();
    logs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    // Delete the user document
    await db.collection('users').doc(id).delete();
    loadStudents();
  } catch(e) {
    alert('Failed to delete student: ' + e.message);
  }
}

async function suspendStudent(id, name, currentlySuspended) {
  const action = currentlySuspended ? 'unsuspend' : 'suspend';
  if (!confirm(`${action.charAt(0).toUpperCase()+action.slice(1)} ${name}? ${currentlySuspended ? 'They will be able to log in again.' : 'They will not be able to log in until unsuspended.'}`)) return;
  try {
    await db.collection('users').doc(id).update({ suspended: !currentlySuspended });
    loadStudents();
  } catch(e) {
    alert('Failed to update student: ' + e.message);
  }
}

function updateSummaryBar(students) {
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const activeToday = students.filter(s => {
    const la = s.lastActive && s.lastActive.toDate ? s.lastActive.toDate().getTime() : 0;
    return la >= todayStart;
  }).length;
  const totalMastered = students.reduce((sum, s) => {
    const r = s.ratings || {};
    return sum + Object.values(r).filter(v => v === 'got').length;
  }, 0);
  const totalXP = students.reduce((sum, s) => sum + (s.xp || 0), 0);

  document.getElementById('sumStudents').textContent = students.length;
  document.getElementById('sumActive').textContent   = activeToday;
  document.getElementById('sumCards').textContent    = totalMastered;
  document.getElementById('sumXP').textContent       = totalXP;
}

    ${badges.length ? `<div class="badge-row">${badges.map(b => `<span class="badge-chip">🏅 ${escHtml(b)}</span>`).join('')}</div>` : ''}
    <div class="last-active">Last active: ${lastAct}</div>
    <div style="display:flex;gap:6px;margin-top:2px;flex-wrap:wrap;">

// ── Report ────────────────────────────────────────────────────────
let currentReportStudent = null;

function openReport(sJson) {
  const s = JSON.parse(sJson);
  currentReportStudent = s;
  const ratings  = s.ratings || {};
  const total    = Object.keys(ratings).length;
  const mastered = Object.values(ratings).filter(v => v === 'got').length;
  const hard     = Object.values(ratings).filter(v => v === 'hard').length;
  const mastPct  = total > 0 ? Math.round((mastered / total) * 100) : 0;
  const joined   = s.createdAt && s.createdAt.toDate ? formatDate(new Date(s.createdAt.seconds * 1000)) : '—';
  const lastAct  = s.lastActive && s.lastActive.seconds ? formatDate(new Date(s.lastActive.seconds * 1000)) : 'Never';

  // Topic breakdown
  const topicStats = {};
  Object.entries(ratings).forEach(([key, val]) => {
    const topic = key.split('||')[0] || 'Unknown';
    if (!topicStats[topic]) topicStats[topic] = {got:0, hard:0, total:0};
    topicStats[topic].total++;
    if (val === 'got')  topicStats[topic].got++;
    if (val === 'hard') topicStats[topic].hard++;
  });
  const topicRows = Object.entries(topicStats)
    .sort((a, b) => (b[1].got/Math.max(b[1].total,1)) - (a[1].got/Math.max(a[1].total,1)))
    .map(([topic, v]) => {
      const pct = Math.round((v.got / v.total) * 100);
      const status = pct >= 75 ? '✅ Strong' : pct >= 40 ? '🟡 Developing' : '❗ Needs Focus';
      return `<div class="report-row"><span>${escHtml(topic)}</span><span class="report-val">${status} (${pct}%)</span></div>`;
    }).join('');

  const badges = (s.badges || []);

  document.getElementById('reportTitle').textContent = `Progress Report — ${s.name || 'Student'}`;
  document.getElementById('reportSub').textContent = `Generated ${formatDate(new Date())}`;
  document.getElementById('reportContent').innerHTML = `
    <div class="report-section">
      <div class="report-section-title">Overview</div>
      <div class="report-row"><span>Student Name</span><span class="report-val">${escHtml(s.name||'—')}</span></div>
      <div class="report-row"><span>Theme</span><span class="report-val">${s.theme||'—'}</span></div>
      <div class="report-row"><span>Joined</span><span class="report-val">${joined}</span></div>
      <div class="report-row"><span>Last Active</span><span class="report-val">${lastAct}</span></div>
      <div class="report-row"><span>Current Streak</span><span class="report-val">${(s.streak||0)>0?s.streak+' days 🔥':'None'}</span></div>
    </div>
    <div class="report-section">
      <div class="report-section-title">Progress Summary</div>
      <div class="report-row"><span>Total XP Earned</span><span class="report-val">${s.xp||0}</span></div>
      <div class="report-row"><span>Cards Seen</span><span class="report-val">${total}</span></div>
      <div class="report-row"><span>Cards Mastered</span><span class="report-val">${mastered} (${mastPct}%)</span></div>
      <div class="report-row"><span>Cards Needing Practice</span><span class="report-val">${hard}</span></div>
      <div class="report-row"><span>Badges Earned</span><span class="report-val">${badges.length}</span></div>
    </div>
    ${topicRows ? `<div class="report-section"><div class="report-section-title">Topic Breakdown</div>${topicRows}</div>` : ''}
    ${badges.length ? `<div class="report-section"><div class="report-section-title">Badges</div><div class="badge-row" style="margin-top:6px">${badges.map(b=>`<span class="badge-chip">🏅 ${escHtml(b)}</span>`).join('')}</div></div>` : ''}
  `;
  document.getElementById('reportModal').classList.add('open');
}

// ── Invite Codes ──────────────────────────────────────────────────
async function loadInviteCodes() {
  const grid = document.getElementById('codesGrid');
  if (!grid) return;
  grid.innerHTML = '<div class="empty-state"><div class="loading-spinner"></div></div>';
  try {
    const snap = await db.collection('inviteCodes').orderBy('createdAt','desc').get();
    if (snap.empty) {
      // Seed default code on first load
      await db.collection('inviteCodes').doc('PREP2027').set({
        code:'PREP2027', active:true,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      loadInviteCodes(); return;
    }
    grid.innerHTML = '';
    snap.forEach(doc => grid.appendChild(buildCodeCard(doc.id, doc.data())));
  } catch(e) {
    grid.innerHTML = '<div class="empty-state">Failed to load invite codes</div>';
    console.error(e);
  }
}

function buildCodeCard(id, data) {
  const card = document.createElement('div');
  card.style.cssText = 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;';
  const active = data.active !== false;
  card.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <span style="font-size:16px;font-weight:900;letter-spacing:2px;color:#fff;">${escHtml(id)}</span>
      <span style="font-size:11px;font-weight:800;padding:3px 10px;border-radius:12px;${active?'background:rgba(74,222,128,0.12);color:#4ade80;border:1px solid rgba(74,222,128,0.3);':'background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);'}">${active?'Active':'Inactive'}</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm btn-deactivate" onclick="toggleCode('${escHtml(id)}',${!active})" style="flex:1;">${active?'Deactivate':'Activate'}</button>
    </div>`;
  return card;
}

async function toggleCode(id, newActive) {
  try {
    await db.collection('inviteCodes').doc(id).update({ active: newActive });
    loadInviteCodes();
  } catch(e) { alert('Failed to update code: ' + e.message); }
}

async function addCode() {
  const code = prompt('Enter new invite code (letters and numbers only):');
  if (!code) return;
  const clean = code.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if (clean.length < 4) { alert('Code must be at least 4 characters.'); return; }
  try {
    await db.collection('inviteCodes').doc(clean).set({
      code: clean, active: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    loadInviteCodes();
  } catch(e) { alert('Failed to add code: ' + e.message); }
}

// ── Habit calendar ────────────────────────────────────────────────
async function showHabitReport(userId, name) {
  const overlay = document.getElementById('habitOverlay');
  const sheet = document.getElementById('habitSheet');
  if (!overlay) return;

  // Show loading state
  document.getElementById('habitStudentName').textContent = name + "'s Habit Tracker";
  document.getElementById('habitStreakRow').innerHTML = '<span style="color:rgba(255,255,255,0.4);font-size:12px;">Loading...</span>';
  document.getElementById('habitCalGrid').innerHTML = '';
  overlay.classList.add('open');

  // Build list of last 30 days
  const today = new Date();
  const days = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    days.push({ key, date: new Date(d), future: d > today });
  }

  // Fetch logs
  const logs = {};
  try {
    for (const day of days) {
      const snap = await db.collection('users').doc(userId).collection('dailyLogs').doc(day.key).get();
      if (snap.exists) logs[day.key] = snap.data();
    }
  } catch(e) {
    document.getElementById('habitStreakRow').innerHTML = '<span style="color:#fca5a5;font-size:12px;">Could not load habit data</span>';
    return;
  }

  // Calculate streak (consecutive days with at least one challenge done, going back from today)
  let currentStreak = 0, longestStreak = 0, tempStreak = 0;
  const allKeys = [...days].reverse().map(d => d.key);
  for (let i = 0; i < allKeys.length; i++) {
    const log = logs[allKeys[i]] || {};
    const hasAny = log.maths15 || log.maths30 || log.english15 || log.english30;
    if (hasAny) {
      tempStreak++;
      if (i === 0 || (i > 0 && (logs[allKeys[i-1]] || {}).maths15 || (logs[allKeys[i-1]] || {}).maths30 || (logs[allKeys[i-1]] || {}).english15 || (logs[allKeys[i-1]] || {}).english30)) {
        if (i === 0) currentStreak = 1;
      }
      longestStreak = Math.max(longestStreak, tempStreak);
    } else {
      if (i === 0) currentStreak = 0;
      tempStreak = 0;
    }
  }
  // Recalculate current streak properly going back from today
  currentStreak = 0;
  for (let i = 0; i < days.length; i++) {
    const day = days[days.length - 1 - i]; // Go backwards from today
    const log = logs[day.key] || {};
    const hasAny = log.maths15 || log.maths30 || log.english15 || log.english30;
    if (hasAny) { currentStreak++; }
    else if (i === 0) { break; } // Today not done — no streak yet
    else { break; }
  }

  // Render streak pills
  const streakRow = document.getElementById('habitStreakRow');
  streakRow.innerHTML = `
    <span class="habit-pill habit-pill-fire">🔥 ${currentStreak} day streak</span>
    <span class="habit-pill habit-pill-best">⭐ Best: ${longestStreak} days</span>`;

  // Render calendar
  const calGrid = document.getElementById('habitCalGrid');
  calGrid.innerHTML = '';
  // Day headers
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    const hdr = document.createElement('div');
    hdr.className = 'cal-day-hdr';
    hdr.textContent = d;
    calGrid.appendChild(hdr);
  });
  // Pad to Monday start
  const firstDow = (days[0].date.getDay() + 6) % 7; // 0=Mon
  for (let i = 0; i < firstDow; i++) {
    const pad = document.createElement('div');
    pad.className = 'cal-day cal-future';
    calGrid.appendChild(pad);
  }
  const todayKey = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  days.forEach(day => {
    const cell = document.createElement('div');
    const log = logs[day.key] || {};
    const count = [log.maths15, log.maths30, log.english15, log.english30].filter(Boolean).length;
    cell.className = 'cal-day ' + (count >= 4 ? 'cal-full' : count > 0 ? 'cal-partial' : 'cal-none');
    if (day.key === todayKey) cell.classList.add('cal-today');
    cell.title = day.key + (count > 0 ? ' (' + count + '/4 challenges)' : ' (none)');
    calGrid.appendChild(cell);
  });

  // Challenge detail summary
  const total = days.length;
  const daysWithAny = days.filter(d => {
    const l = logs[d.key] || {};
    return l.maths15 || l.maths30 || l.english15 || l.english30;
  }).length;
  const daysWithAll = days.filter(d => {
    const l = logs[d.key] || {};
    return l.maths15 && l.maths30 && l.english15 && l.english30;
  }).length;
  document.getElementById('habitSummaryText').textContent =
    'Active ' + daysWithAny + ' of last 30 days · All 4 challenges: ' + daysWithAll + ' days';
}

function closeHabitOverlay(e) {
  if (!e || e.target === document.getElementById('habitOverlay'))
    document.getElementById('habitOverlay').classList.remove('open');
}
