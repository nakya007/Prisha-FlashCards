<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📚 English Flashcards – Grammar School Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', -apple-system, Arial, sans-serif; background: #f4f6fb; color: #1a1a2e; min-height: 100vh; }

  /* HEADER */
  .page-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn {
    background: #f0f2f8; border: none; border-radius: 50%;
    width: 40px; height: 40px; font-size: 1.15em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; flex-shrink: 0;
  }
  .header-title { font-size: 1.2em; font-weight: 900; color: #1a1a2e; }
  .header-sub { font-size: 0.7em; color: #999; font-weight: 700; margin-top: 1px; }
  .home-link { font-size: 0.75em; color: #aaa; text-decoration: none; font-weight: 700; margin-left: auto; flex-shrink: 0; }
  .shuffle-header-btn {
    margin-left: auto; background: #ffd700; border: none; border-radius: 20px;
    padding: 7px 14px; font-size: 0.8em; font-weight: 800;
    cursor: pointer; font-family: 'Nunito', sans-serif; touch-action: manipulation;
  }

  /* ═══ TOPIC VIEW ═══ */
  .topic-intro { padding: 20px 18px 6px; text-align: center; }
  .topic-intro h2 { font-size: 1.45em; font-weight: 900; color: #1a1a2e; }
  .topic-intro p { font-size: 0.8em; color: #999; margin-top: 4px; font-weight: 700; }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 13px; padding: 14px 14px 40px; max-width: 720px; margin: 0 auto;
  }
  .topic-tile {
    border-radius: 18px; padding: 20px 12px 16px; cursor: pointer;
    text-align: center; display: flex; flex-direction: column;
    align-items: center; gap: 7px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    touch-action: manipulation; transition: transform 0.16s, box-shadow 0.16s;
  }
  .topic-tile:active { transform: scale(0.96); }
  .tile-emoji { font-size: 2.2em; line-height: 1; }
  .tile-name { font-size: 0.77em; font-weight: 900; color: white; line-height: 1.35; }
  .tile-count { font-size: 0.63em; font-weight: 700; color: rgba(255,255,255,0.75); background: rgba(0,0,0,0.15); padding: 2px 8px; border-radius: 10px; }
  .all-tile { background: linear-gradient(145deg, #1a1a3a, #2d2d60); grid-column: 1 / -1; flex-direction: row; padding: 16px 22px; gap: 14px; }
  .all-tile .tile-emoji { font-size: 2em; }
  .all-tile .tile-name { font-size: 1em; color: #ffd700; flex: 1; text-align: left; }
  .all-tile .tile-count { font-size: 0.75em; background: rgba(255,215,0,0.15); }

  /* ═══ CARD VIEW ═══ */
  #cardView { display: none; }
  .card-view-inner { padding: 12px 14px 40px; max-width: 680px; margin: 0 auto; }
  .card-progress { font-size: 0.78em; color: #999; font-weight: 700; text-align: center; margin-bottom: 12px; }

  .card-wrapper { width: 100%; cursor: pointer; position: relative; touch-action: manipulation; margin-bottom: 18px; }
  .card-inner { position: relative; width: 100%; }

  .card-face {
    border-radius: 22px; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 54px 22px 22px; text-align: center;
    box-shadow: 0 10px 32px rgba(0,0,0,0.18);
    min-height: 290px; transition: opacity 0.25s ease;
  }
  .card-back-face {
    position: absolute; top: 0; left: 0; width: 100%; min-height: 290px;
    border-radius: 22px; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 54px 22px 22px; text-align: center;
    box-shadow: 0 10px 32px rgba(0,0,0,0.18);
    opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
  }
  .card-inner.flipped .card-face { opacity: 0; pointer-events: none; }
  .card-inner.flipped .card-back-face { opacity: 1; pointer-events: auto; }

  .card-tag {
    position: absolute; top: 14px; left: 14px;
    font-size: 0.67em; font-weight: 900; padding: 3px 10px; border-radius: 10px;
    background: rgba(255,255,255,0.2); color: white;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .card-session-lbl {
    position: absolute; top: 14px; right: 14px;
    font-size: 0.6em; color: rgba(255,255,255,0.5); font-weight: 700;
    max-width: 46%; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-big-emoji { font-size: 2.6em; margin-bottom: 8px; line-height: 1; }
  .card-q-text { font-size: 1.05em; font-weight: 800; color: white; line-height: 1.5; white-space: pre-wrap; }
  .card-hint-lbl { font-size: 0.67em; color: rgba(255,255,255,0.4); margin-top: 12px; font-weight: 700; }
  .answer-hdr { font-size: 0.62em; font-weight: 900; color: rgba(255,255,255,0.65); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .card-a-text { font-size: 0.92em; font-weight: 700; color: white; line-height: 1.7; white-space: pre-wrap; }

  /* NAV */
  .nav-buttons { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .nav-btn {
    background: white; color: #444; border: 2px solid #dde0ea;
    border-radius: 50%; width: 50px; height: 50px; font-size: 1.3em;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; box-shadow: 0 3px 10px rgba(0,0,0,0.09);
  }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }
  .action-btn {
    padding: 12px 24px; border-radius: 22px; border: none; cursor: pointer;
    font-size: 0.9em; font-weight: 800; font-family: 'Nunito', sans-serif;
    box-shadow: 0 4px 14px rgba(0,0,0,0.14); touch-action: manipulation; transition: transform 0.15s;
  }
  .action-btn:active { transform: scale(0.95); }
  .flip-btn { background: #1a1a3a; color: white; }

  .progress-bar-wrap { width: 100%; background: #e4e6f0; border-radius: 6px; height: 6px; margin-top: 18px; }
  .progress-bar { height: 6px; border-radius: 6px; transition: width 0.3s; }

  @media (max-width: 480px) {
    .topic-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 12px 12px 40px; }
    .topic-tile { padding: 16px 10px 14px; }
    .tile-emoji { font-size: 1.9em; }
    .card-face, .card-back-face { min-height: 300px; padding: 54px 16px 20px; }
    .card-q-text { font-size: 0.97em; }
    .card-a-text { font-size: 0.85em; }
  }

  /* ═══ ENCHANTED LIBRARY THEME ═══ */
  body { background: linear-gradient(160deg, #050f08 0%, #0a1f10 45%, #08181a 100%) !important; color: white !important; }
  .page-header { background: rgba(5,15,8,0.92) !important; border-bottom: 1px solid rgba(80,200,120,0.25) !important; box-shadow: 0 2px 24px rgba(0,0,0,0.7) !important; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
  .back-btn { background: rgba(255,255,255,0.1) !important; color: white !important; border: 1px solid rgba(80,200,120,0.25) !important; }
  .header-title { color: white !important; }
  .header-sub { color: rgba(120,220,160,0.75) !important; }
  .home-link { color: rgba(120,220,160,0.65) !important; }
  .shuffle-header-btn { background: linear-gradient(135deg, #2e7d32, #66bb6a) !important; color: white !important; }
  .topic-intro h2 { color: white !important; }
  .topic-intro p { color: rgba(120,220,160,0.75) !important; }
  .card-progress { color: rgba(120,220,160,0.75) !important; }
  .nav-btn { background: rgba(255,255,255,0.07) !important; color: white !important; border: 2px solid rgba(80,200,120,0.3) !important; box-shadow: 0 0 14px rgba(60,180,80,0.12) !important; }
  .flip-btn { background: linear-gradient(135deg, #1b5e20, #43a047) !important; box-shadow: 0 4px 18px rgba(67,160,71,0.4) !important; }
  .progress-bar-wrap { background: rgba(255,255,255,0.1) !important; }
  .theme-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: -1; overflow: hidden; }
  .theme-star { position: absolute; border-radius: 50%; will-change: transform, opacity; -webkit-animation: t-tw ease-in-out infinite; animation: t-tw ease-in-out infinite; }
  @-webkit-keyframes t-tw { 0%,100%{opacity:.1;-webkit-transform:scale(1);transform:scale(1)} 50%{opacity:.9;-webkit-transform:scale(2);transform:scale(2)} }
  @keyframes t-tw { 0%,100%{opacity:.1;transform:scale(1)} 50%{opacity:.9;transform:scale(2)} }
  .theme-float { position: absolute; pointer-events: none; user-select: none; opacity: 0; will-change: transform, opacity; -webkit-animation: t-rise linear infinite; animation: t-rise linear infinite; }
  @-webkit-keyframes t-rise { 0%{-webkit-transform:translate3d(0,110vh,0) rotate(0deg);opacity:0} 8%{opacity:.22} 92%{opacity:.22} 100%{-webkit-transform:translate3d(0,-10vh,0) rotate(360deg);opacity:0} }
  @keyframes t-rise { 0%{transform:translate3d(0,110vh,0) rotate(0deg);opacity:0} 8%{opacity:.22} 92%{opacity:.22} 100%{transform:translate3d(0,-10vh,0) rotate(360deg);opacity:0} }

  /* ── TOPIC SEARCH BAR ── */
  .search-wrap { padding: 4px 14px 14px; max-width: 720px; margin: 0 auto; }
  .search-box { position: relative; }
  .search-icon { position: absolute; left: 14px; top: 50%; -webkit-transform: translateY(-50%); transform: translateY(-50%); font-size: 1em; pointer-events: none; line-height: 1; }
  .search-input {
    width: 100%; padding: 12px 18px 12px 44px;
    border-radius: 30px; border: 2px solid rgba(80,200,120,0.3);
    background: rgba(255,255,255,0.08); color: white;
    font-size: 0.9em; font-weight: 700; font-family: 'Nunito', sans-serif;
    outline: none; -webkit-appearance: none; appearance: none;
    -webkit-transition: border-color 0.2s, box-shadow 0.2s; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.35); font-weight: 600; }
  .search-input:focus { border-color: rgba(80,200,120,0.65); box-shadow: 0 0 18px rgba(80,200,120,0.22); }
  .search-input::-webkit-search-cancel-button { -webkit-appearance: none; }
  .no-results { display: none; text-align: center; padding: 28px 14px; color: rgba(255,255,255,0.38); font-weight: 700; font-size: 0.85em; }
</style>
</head>
<body>
<div id="themeBg" class="theme-bg"></div>

<!-- ═══ TOPIC VIEW ═══ -->
<div id="topicView">
  <div class="page-header">
    <div>
      <div class="header-title">📚 English Flashcards</div>
      <div class="header-sub">Grammar School Prep · Pillai Tutors</div>
    </div>
    <a class="home-link" href="index.html">🏠 Home</a>
  </div>
  <div class="topic-intro">
    <h2>Choose a Topic</h2>
    <p>Tap a topic tile to start practising</p>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="search"
             placeholder="Search topics e.g. verbs, figurative…" autocomplete="off" autocorrect="off"
             oninput="handleSearch(this.value)"
             onkeydown="if(event.key==='Escape'){this.value='';handleSearch('')}">
    </div>
  </div>
  <div class="no-results" id="noResults">🤔 No topics match — try a different word</div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- ═══ CARD VIEW ═══ -->
<div id="cardView">
  <div class="page-header">
    <button class="back-btn" onclick="backToTopics()" title="Back to topics">&#8592;</button>
    <div>
      <div class="header-title" id="cvTitle"></div>
      <div class="header-sub" id="cvSub"></div>
    </div>
    <button class="shuffle-header-btn" onclick="shuffleCards()">🔀 Shuffle</button>
  </div>
  <div class="card-view-inner">
    <div class="card-progress" id="cardProgress"></div>
    <div class="card-wrapper" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-face" id="cardFront">
          <div class="card-tag" id="frontTag"></div>
          <div class="card-session-lbl" id="frontSession"></div>
          <div class="card-big-emoji" id="cardEmoji"></div>
          <div class="card-q-text" id="cardQuestion"></div>
          <div class="card-hint-lbl">👆 Tap to reveal answer</div>
        </div>
        <div class="card-back-face" id="cardBack">
          <div class="card-tag" id="backTag"></div>
          <div class="card-session-lbl" id="backSession"></div>
          <div class="answer-hdr">✨ Answer</div>
          <div class="card-a-text" id="cardAnswer"></div>
          <div class="card-hint-lbl">👆 Tap to see question</div>
        </div>
      </div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
      <button class="action-btn flip-btn" onclick="flipCard()">Flip Card</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<script>
const TOPIC_META = {
  "Nouns":                 { emoji:"🏷️", g1:"#1565c0", g2:"#1e88e5", d1:"#0d47a1", d2:"#1565c0" },
  "Pronouns":              { emoji:"👤", g1:"#00838f", g2:"#00acc1", d1:"#006064", d2:"#00838f" },
  "Adjectives":            { emoji:"🎨", g1:"#c62828", g2:"#e53935", d1:"#b71c1c", d2:"#c62828" },
  "Verbs & Tenses":        { emoji:"⚡", g1:"#e65100", g2:"#f57c00", d1:"#bf360c", d2:"#e65100" },
  "Figurative Language":   { emoji:"🌟", g1:"#7b2d8b", g2:"#9c27b0", d1:"#4a148c", d2:"#7b2d8b" },
  "Prefixes & Suffixes":   { emoji:"🔤", g1:"#2e7d32", g2:"#388e3c", d1:"#1b5e20", d2:"#2e7d32" },
  "Plurals & Spelling":    { emoji:"✏️", g1:"#4527a0", g2:"#5e35b1", d1:"#311b92", d2:"#4527a0" },
  "Clauses":               { emoji:"🔗", g1:"#00695c", g2:"#00897b", d1:"#004d40", d2:"#00695c" },
  "Adverbials":            { emoji:"📍", g1:"#f57f17", g2:"#f9a825", d1:"#e65100", d2:"#f57f17" },
  "Punctuation":           { emoji:"❗", g1:"#ad1457", g2:"#d81b60", d1:"#880e4f", d2:"#ad1457" },
  "Prepositions":          { emoji:"📌", g1:"#5d4037", g2:"#6d4c41", d1:"#3e2723", d2:"#5d4037" },
  "Homophones":            { emoji:"👯", g1:"#558b2f", g2:"#7cb342", d1:"#33691e", d2:"#558b2f" },
  "Determiners":           { emoji:"📋", g1:"#283593", g2:"#3949ab", d1:"#1a237e", d2:"#283593" },
  "Text Types":            { emoji:"📝", g1:"#bf360c", g2:"#e64a19", d1:"#8d1f00", d2:"#bf360c" },
  "Reading Comprehension": { emoji:"🔎", g1:"#37474f", g2:"#546e7a", d1:"#263238", d2:"#37474f" },
  "Paragraphs & Cohesion": { emoji:"🧩", g1:"#6a1b9a", g2:"#8e24aa", d1:"#4a148c", d2:"#6a1b9a" },
  "Grammar Rules":         { emoji:"📚", g1:"#004d40", g2:"#00695c", d1:"#002b27", d2:"#004d40" },
};

const FUN_EMOJIS = ["🦄","🐉","🦊","🐸","🦁","🐧","🦋","🐬","🦖","🐙","🌈","⭐","🚀","🌺","🎈","🍦","🎮","🦜","🐣","🌻","🎸","🏆","🎭","🦩","🐳"];

const ALL_CARDS = [
  // ── NOUNS ──────────────────────────────────────────────────────────────────
  { topic:"Nouns", session:"Lessons 1F, 2F · Rev 1, 3", q:"What is a noun?", a:"A word that names a person, place, animal, or thing.\n\nExamples: teacher, London, cat, happiness" },
  { topic:"Nouns", session:"Lessons 1F, 2F · Rev 1, 3", q:"What is a COMMON noun?", a:"A noun that names any general person, place, or thing — not a specific one.\n\nExamples: dog, city, book, girl" },
  { topic:"Nouns", session:"Lessons 1F, 2F · Rev 1, 3", q:"What is a PROPER noun?", a:"A noun that names a specific person, place, day, or title. Always starts with a CAPITAL letter.\n\nExamples: London, Harry, Monday, River Thames" },
  { topic:"Nouns", session:"Rev 1, 3 · Lesson 1F", q:"What is an ABSTRACT noun?", a:"A noun that names a feeling, idea, quality, or concept you cannot touch or see.\n\nExamples: happiness, courage, love, freedom, justice" },
  { topic:"Nouns", session:"Rev 1, 3 · Lesson 2F", q:"What is a COLLECTIVE noun?", a:"A noun that names a group of people, animals, or things.\n\nExamples:\n• a flock of birds\n• a pack of wolves\n• a swarm of bees\n• a team of players" },
  { topic:"Nouns", session:"Lesson 2F", q:"What is a COMPOUND noun?", a:"A noun made from two or more words combined.\n\nExamples: football, bedroom, sunflower, raincoat, toothbrush" },
  { topic:"Nouns", session:"Revision 37", q:"Give the feminine form of: king, actor, waiter, hero, duke", a:"king → queen\nactor → actress\nwaiter → waitress\nhero → heroine\nduke → duchess" },
  { topic:"Nouns", session:"Revision", q:"TRICKY: Is 'darkness' a common, proper, abstract, or collective noun?", a:"ABSTRACT noun — it names a concept or quality you cannot see or touch.\n\n'The darkness swallowed the path.' → abstract\n\nMore tricky examples:\nSILENCE · JUSTICE · HOPE · MISERY · PRIDE\n\nThese cannot be held, but they can be felt!" },
  // ── PRONOUNS ───────────────────────────────────────────────────────────────
  { topic:"Pronouns", session:"Lesson 3F · Rev 2", q:"What is a PRONOUN?", a:"A word that replaces a noun to avoid repetition.\n\nExamples: he, she, it, they, we, I, you, me, us, them" },
  { topic:"Pronouns", session:"Lesson 3F", q:"What are PERSONAL pronouns?", a:"Pronouns that refer to specific people or things.\n\nSubject: I, you, he, she, it, we, they\nObject: me, you, him, her, it, us, them\n\nExample: Tom dropped his bag → He dropped it." },
  { topic:"Pronouns", session:"Lesson 15F · 21F", q:"What is a RELATIVE pronoun?", a:"A pronoun that introduces a relative clause.\n\nWords: who, which, that, whose, whom\n\nExample: The girl WHO won the race is my friend." },
  { topic:"Pronouns", session:"Lesson 3F", q:"What is POINT OF VIEW? What pronouns signal it?", a:"1st person: narrator in the story → I, we, me, us\n2nd person: reader addressed → you\n3rd person: narrator outside story → he, she, they, it\n\nTip: stay consistent throughout!" },
  // ── ADJECTIVES ─────────────────────────────────────────────────────────────
  { topic:"Adjectives", session:"Lesson 4F · 7 22", q:"What is an ADJECTIVE?", a:"A word that describes or modifies a noun or pronoun.\n\nExamples: tall, blue, happy, enormous, ancient, delightful\n\nTip: Replace boring adjectives with adventurous ones!" },
  { topic:"Adjectives", session:"Lesson 4F · 7 22", q:"What is the COMPARATIVE form of an adjective?", a:"Used to compare TWO things. Add -er or use 'more'.\n\nshort → shorter\ntall → taller\nbeautiful → more beautiful\ngood → better (irregular)\nbad → worse (irregular)" },
  { topic:"Adjectives", session:"Lesson 4F · 7 22", q:"What is the SUPERLATIVE form of an adjective?", a:"Used to compare THREE or more things. Add -est or use 'most'.\n\nshort → shortest\ntall → tallest\nbeautiful → most beautiful\ngood → best\nbad → worst" },
  { topic:"Adjectives", session:"Lesson 17F", q:"What are SENSORY adjectives?", a:"Adjectives that describe what something looks, sounds, smells, tastes, or feels like.\n\nSight: gleaming, shadowy\nSound: thunderous, hushed\nSmell: musty, fragrant\nTaste: bitter, tangy\nTouch: rough, silky" },
  { topic:"Adjectives", session:"Lesson 7 22", q:"Replace these weak adjectives: nice, big, sad, scared, happy", a:"nice → delightful, charming, pleasant\nbig → enormous, colossal, towering\nsad → devastated, heartbroken, miserable\nscared → terrified, petrified, alarmed\nhappy → ecstatic, overjoyed, elated" },
  // ── VERBS AND TENSES ───────────────────────────────────────────────────────
  { topic:"Verbs & Tenses", session:"Lesson 5 · 8F · Christmas", q:"What is a VERB?", a:"A word that shows an action or a state of being.\n\nAction verbs: run, jump, shout, write\nBeing verbs: is, are, was, were, seem, appear" },
  { topic:"Verbs & Tenses", session:"Lesson 5 · 8F", q:"What are the three main TENSES?", a:"PAST – already happened:\n  She ran to school.\n\nPRESENT – happening now:\n  She runs to school.\n\nFUTURE – will happen:\n  She will run to school." },
  { topic:"Verbs & Tenses", session:"Lesson 5 · 8F", q:"What is the PRESENT PROGRESSIVE tense?", a:"Describes an action happening right NOW.\nFormed with: is/are + verb + -ing\n\nShe is running.\nThey are playing.\n\nSingular → is · Plural → are" },
  { topic:"Verbs & Tenses", session:"Lesson 5 · 8F", q:"What is the PAST PROGRESSIVE tense?", a:"Describes an action ongoing at a moment in the past.\nFormed with: was/were + verb + -ing\n\nHe was reading when the bell rang.\nThey were sleeping all morning." },
  { topic:"Verbs & Tenses", session:"Lesson 5 · 8F", q:"What is the PRESENT PERFECT tense?", a:"Actions that happened at an unspecified time before now.\nFormed with: has/have + past participle\n\nShe has eaten her lunch.\nI have visited Paris.\n\nClue words: already, just, yet, ever, never" },
  { topic:"Verbs & Tenses", session:"Lesson 8F · Rev 41", q:"What is grammatical consistency in tense?", a:"Keeping the same tense throughout your writing.\n\n✗ She walked into the room and sits down.\n✓ She walked into the room and sat down." },
  { topic:"Verbs & Tenses", session:"Revision", q:"What is the PASSIVE VOICE? How do you identify it?", a:"ACTIVE: the subject DOES the action.\n  'The dog bit the boy.'\n\nPASSIVE: the subject RECEIVES the action.\n  'The boy was bitten by the dog.'\n\nHow to spot passive:\nForm of 'to be' + past participle\n(was bitten, is eaten, were told)\n\nUsed in: reports, formal writing, newspaper articles." },
  // ── FIGURATIVE LANGUAGE ────────────────────────────────────────────────────
  { topic:"Figurative Language", session:"Lesson 17F", q:"What does HAMOPS stand for?", a:"HAMOPS is the memory trick for ALL 6 figurative language techniques:\n\nH – Hyperbole\nA – Alliteration\nM – Metaphor\nO – Onomatopoeia\nP – Personification\nS – Simile\n\n💡 Spot one of these in a text? Name it AND explain its effect on the reader for full marks!" },
  { topic:"Figurative Language", session:"Lesson 6 · 17F", q:"What is a SIMILE?", a:"A comparison between two things using 'like' or 'as'.\n\nShe was as brave as a lion.\nThe stars sparkled like diamonds.\nHe ran like the wind." },
  { topic:"Figurative Language", session:"Lesson 6 · 17F", q:"What is a METAPHOR?", a:"Saying one thing IS another — without 'like' or 'as'.\n\nThe classroom was a zoo.\nLife is a rollercoaster.\nHer eyes were diamonds.\n\nMetaphor = a direct comparison." },
  { topic:"Figurative Language", session:"Lesson 17F", q:"What is ONOMATOPOEIA?", a:"A word that sounds like the thing it describes.\n\nExamples: buzz, crash, sizzle, bang, hiss, squelch, whoosh, clatter\n\nCreates sound effects in your writing!" },
  { topic:"Figurative Language", session:"Lesson 6 · 17F", q:"What is PERSONIFICATION?", a:"Giving human feelings or actions to an object or idea.\n\nThe wind whispered through the trees.\nThe sun smiled down on us.\nOpportunity knocked on his door." },
  { topic:"Figurative Language", session:"Lesson 17F", q:"What is ALLITERATION?", a:"Repeating the same consonant sound at the start of nearby words.\n\nSilent, slithering snakes.\nPeter Piper picked a peck of pickled peppers.\n\nEffect: creates rhythm and emphasis." },
  { topic:"Figurative Language", session:"Lesson 17F", q:"What is HYPERBOLE?", a:"Deliberate exaggeration for emphasis or effect — NOT meant literally!\n\n'I've told you a million times!'\n'I'm so hungry I could eat a horse!'\n'My bag weighs a tonne.'\n\nEffect: adds drama, humour, or emphasis.\n\nExam tip: name it AND explain the effect on the reader!" },
  { topic:"Figurative Language", session:"Lesson 17F", q:"What is PATHETIC FALLACY?", a:"Using weather or nature to reflect a character's MOOD or the ATMOSPHERE of a scene.\n\n'The thunder growled angrily as she stormed out.'\n'Gentle sunlight warmed their joyful laughter.'\n'Dark clouds gathered as the news broke.'\n\nEffect: creates atmosphere and mirrors emotions.\nIt's a type of personification — name BOTH for full marks!" },
  // ── PREFIXES AND SUFFIXES ──────────────────────────────────────────────────
  { topic:"Prefixes & Suffixes", session:"Lesson 10F", q:"What do these prefixes mean?\nun–, re–, mis–, dis–, pre–, over–", a:"un– = not / opposite (unhappy, unusual)\nre– = again / back (redo, return)\nmis– = wrongly (mistake, misread)\ndis– = not / opposite (disagree, dislike)\npre– = before (preview, prepare)\nover– = too much (overcooked, overdue)" },
  { topic:"Prefixes & Suffixes", session:"Lesson 10F", q:"What do these prefixes mean?\nsub–, inter–, super–, auto–, bi–, anti–", a:"sub– = under (submarine, subway)\ninter– = between (international)\nsuper– = above/beyond (supernatural)\nauto– = self (autobiography)\nbi– = two (bicycle, bilingual)\nanti– = against (antibiotic)" },
  { topic:"Prefixes & Suffixes", session:"Lesson 10F · 11F", q:"What do these suffixes mean?\n–ful, –less, –ness, –tion, –ly, –er, –ment", a:"–ful = full of (joyful, careful)\n–less = without (hopeless, careless)\n–ness = state of being (happiness)\n–tion = noun from verb (celebration)\n–ly = makes adverbs (quickly)\n–er = one who does (teacher)\n–ment = act of (enjoyment)" },
  // ── PLURALS ────────────────────────────────────────────────────────────────
  { topic:"Plurals & Spelling", session:"Lesson 11F · 19F", q:"What are the rules for making nouns PLURAL?", a:"• Most nouns: add –s (cat→cats)\n• Ends –s, –sh, –ch, –x, –z: add –es (church→churches)\n• Consonant + y: change y to i + es (city→cities)\n• Vowel + y: add –s (monkey→monkeys)\n• Irregular: child→children, mouse→mice, person→people" },
  { topic:"Plurals & Spelling", session:"Lesson 11F", q:"What are some tricky IRREGULAR plurals?", a:"child → children\nmouse → mice\ngoose → geese\ntooth → teeth\nfoot → feet\nman → men · woman → women\nleaf → leaves · half → halves\ncactus → cacti" },
  // ── CLAUSES ────────────────────────────────────────────────────────────────
  { topic:"Clauses", session:"Lesson 15F · 21F", q:"What is a MAIN CLAUSE?", a:"A clause that makes complete sense ON ITS OWN.\nIt has a subject and a verb.\n\nThe dog barked.\nShe opened the door.\nLightning struck the tree." },
  { topic:"Clauses", session:"Lesson 15F · 21F", q:"What is a SUBORDINATE CLAUSE?", a:"A clause that CANNOT stand alone — it depends on the main clause.\n\nbecause it was hungry\nwhen the storm ended\nalthough she was tired\n\nJoined by: because, when, although, while, if, unless, since, after, before" },
  { topic:"Clauses", session:"Lesson 15F", q:"What is a RELATIVE CLAUSE?", a:"Gives more information about a noun. Introduced by a relative pronoun.\n\nThe book that I lost was new.\nThe girl who won the prize smiled.\nMy house, which is old, needs repairs." },
  { topic:"Clauses", session:"Lesson 15F", q:"WHO vs WHICH vs THAT in relative clauses?", a:"WHO → refers to people\n  The teacher who taught me was kind.\n\nWHICH → things, adds non-essential info (use commas)\n  The car, which was red, sped away.\n\nTHAT → things, essential info (no commas)\n  The book that I borrowed was lost." },
  { topic:"Clauses", session:"Lesson 15F", q:"What is an EMBEDDED CLAUSE? Give an example.", a:"A subordinate clause placed INSIDE the main clause — between the subject and its verb.\n\n'The girl, who had been waiting for hours, finally smiled.'\n'The teacher, despite being exhausted, marked every book.'\n\nTest: remove the embedded clause:\n→ 'The girl finally smiled.' ✓ Still makes sense!\n\nAlways separated by COMMAS on both sides." },
  // ── ADVERBIALS ─────────────────────────────────────────────────────────────
  { topic:"Adverbials", session:"Lesson 16F · 29F · 30F", q:"What is an ADVERBIAL?", a:"A word, phrase, or clause that tells you MORE about a verb — when, where, how, or why something happens.\n\nTime: in the morning, yesterday\nPlace: in the garden, behind the tree\nManner: quickly, with great care" },
  { topic:"Adverbials", session:"Lesson 16F · 29F", q:"What is a FRONTED ADVERBIAL?", a:"An adverbial placed at the START of a sentence — always followed by a COMMA.\n\nEarly the next morning, the explorers set off.\nWith a heavy heart, she said goodbye.\nBefore the match, the team warmed up." },
  { topic:"Adverbials", session:"Lesson 29F · 30F", q:"Give examples of adverbial phrases for TIME, PLACE, and MANNER", a:"TIME:\nIn the morning · Later that day · Eventually · By nightfall\n\nPLACE:\nIn the enchanted forest · Beyond the mountains\n\nMANNER:\nWith great care · As quietly as a mouse" },
  // ── PUNCTUATION ────────────────────────────────────────────────────────────
  { topic:"Punctuation", session:"Lesson 9F · 20F", q:"APOSTROPHE for POSSESSION — the rules", a:"Singular owner → add 's\n  the dog's bone · the girl's bag\n\nPlural owner ending in s → add '\n  the dogs' bones · the teachers' meeting\n\nIrregular plural → add 's\n  the children's playground" },
  { topic:"Punctuation", session:"Lesson 9F", q:"APOSTROPHE for CONTRACTION — give examples", a:"do not → don't\nI am → I'm\nthey are → they're\nit is → it's\nyou are → you're\ncannot → can't\nwould not → wouldn't" },
  { topic:"Punctuation", session:"Lesson 20F", q:"How do you punctuate DIRECT SPEECH?", a:"1. Put spoken words inside \" \"\n2. Start speech with a capital letter\n3. Punctuate INSIDE the closing \"\n4. New speaker = new paragraph\n\n\"I am ready,\" said Tom.\n\"Are you sure?\" she asked.\n\"Let's go!\" he shouted." },
  { topic:"Punctuation", session:"Lesson 9F · 22F · 23F", q:"When do you use a SEMICOLON?", a:"1. To join two closely related independent clauses:\n   It was raining; we stayed inside.\n\n2. To separate list items that already have commas:\n   Paris, France; Rome, Italy; Berlin, Germany." },
  { topic:"Punctuation", session:"Lesson 23F", q:"When do you use a COLON?", a:"1. To introduce a LIST:\n   I need three things: a pen, a ruler, and paper.\n\n2. To introduce an EXPLANATION:\n   There was only one problem: it was locked.\n\n3. To introduce a QUOTATION:\n   She remembered: 'Work hard and be kind.'" },
  { topic:"Punctuation", session:"Lesson 20F · 21F", q:"Give 4 uses of COMMAS", a:"1. After a fronted adverbial:\n   In the morning, she woke early.\n\n2. To separate list items:\n   apples, oranges, and pears.\n\n3. Around extra information (parenthesis):\n   My dog, a golden retriever, loves walks.\n\n4. Before a coordinating conjunction:\n   It was cold, but she didn't wear a coat." },
  { topic:"Punctuation", session:"Lesson 20F", q:"its/it's · your/you're · their/they're", a:"ITS = belonging to it → The cat hurt its paw.\nIT'S = it is/it has → It's raining.\n\nYOUR = belonging to you → Is this your book?\nYOU'RE = you are → You're amazing!\n\nTHEIR = belonging to them → Their house is big.\nTHEY'RE = they are → They're playing outside." },
  { topic:"Punctuation", session:"Lesson 23F", q:"When do you use DASHES and BRACKETS?\nWhat is parenthesis?", a:"PARENTHESIS = extra information inside a sentence.\nThree ways to mark it:\n\nCOMMAS (softest): The castle, built in 1066, still stands.\nBRACKETS (factual): The castle (built in 1066) still stands.\nDASHES (dramatic): The castle — ancient and crumbling — still stands.\n\nRemove the parenthesis → sentence still works!\nDashes = most dramatic effect." },
  // ── PREPOSITIONS ───────────────────────────────────────────────────────────
  { topic:"Prepositions", session:"Lesson 24F · Rev 34", q:"What is a PREPOSITION?", a:"A word that shows the RELATIONSHIP between a noun/pronoun and other words — usually showing position, direction, or time.\n\nExamples: in, on, under, beside, between, behind, above, below, near, through, across" },
  { topic:"Prepositions", session:"Lesson 24F · Rev 34", q:"Prepositions of PLACE, TIME, and DIRECTION", a:"PLACE: in, on, under, beside, between, behind, above, below, near, opposite\n\nTIME: at, on, in, before, after, during, since, for, until, by\n\nDIRECTION: to, towards, into, through, across, along, up, down" },
  { topic:"Prepositions", session:"Revision 34", q:"What is a PREPOSITIONAL PHRASE?", a:"A phrase that starts with a preposition.\n\nunder the ancient oak tree\nbeside the rushing river\nduring the long summer holiday\ntowards the glowing horizon\n\nThese can be used as fronted adverbials!" },
  // ── HOMOPHONES ─────────────────────────────────────────────────────────────
  { topic:"Homophones", session:"Lesson 25F", q:"What is a HOMOPHONE?", a:"A word that SOUNDS THE SAME as another but has a different spelling and meaning.\n\nthere / their / they're\nto / too / two\nyour / you're · its / it's\nright / write · hear / here" },
  { topic:"Homophones", session:"Lesson 25F", q:"there / their / they're", a:"THERE = a place\n  The keys are over there.\n  (contains 'here' — think of place!)\n\nTHEIR = belonging to them\n  That is their house.\n\nTHEY'RE = they are\n  They're coming to dinner." },
  { topic:"Homophones", session:"Lesson 25F", q:"to / too / two", a:"TO = direction or infinitive\n  She went to the shops.\n  She wants to sing.\n\nTOO = also or excessively\n  I want to come too.\n  It's too hot.\n  (extra 'o' = extra/also!)\n\nTWO = the number 2" },
  { topic:"Homophones", session:"Lesson 25F", q:"affect/effect · accept/except · allowed/aloud", a:"affect (verb) = to influence → The rain affected the game.\neffect (noun) = the result → The effect was dramatic.\n\naccept = to receive willingly\nexcept = not including → Everyone except Tom.\n\nallowed = permitted\naloud = out loud → Read it aloud." },
  // ── DETERMINERS ────────────────────────────────────────────────────────────
  { topic:"Determiners", session:"Lesson 29F", q:"What is a DETERMINER?", a:"A word placed BEFORE a noun to show which one or how many.\n\nArticles: the, a, an\nDemonstratives: this, that, these, those\nPossessives: my, your, his, her, our, their\nQuantifiers: some, many, few, each, every, several" },
  { topic:"Determiners", session:"Lesson 29F", q:"When do you use 'A' vs 'AN'?", a:"A → before a CONSONANT sound\n  a cat · a uniform ('yoo' sound) · a European\n\nAN → before a VOWEL sound\n  an apple · an hour (silent 'h') · an honest man\n\nKey: it's about the SOUND, not the letter!" },
  // ── TEXT TYPES ─────────────────────────────────────────────────────────────
  { topic:"Text Types", session:"Lesson 26F", q:"What does MADFOREST stand for?", a:"MADFOREST is the memory trick for persuasive writing techniques:\n\nM – Modal verbs (must, should, could, would)\nA – Alliteration\nD – Direct address (you, your, we, our)\nF – Facts\nO – Opinions\nR – Rhetorical questions\nE – Emotive language\nS – Statistics\nT – Triples (rule of three)\n\n💡 Use MADFOREST to pack your persuasive writing with powerful techniques!" },
  { topic:"Text Types", session:"Lesson 26F", q:"MADFOREST: give an example of each technique", a:"M – Modal: 'You must act now.'\nA – Alliteration: 'Powerful, passionate people'\nD – Direct address: 'Think about your future.'\nF – Fact: 'Over 1 million children are affected.'\nO – Opinion: 'In my view, this is unacceptable.'\nR – Rhetorical Q: 'Wouldn't you want change?'\nE – Emotive: 'Innocent children are suffering.'\nS – Statistic: '8 out of 10 experts agree.'\nT – Triples: 'Unfair, unjust, unacceptable.'" },
  { topic:"Text Types", session:"Rev 36 · Lesson 26F", q:"Features of PERSUASIVE WRITING", a:"• First person (I believe, In my opinion)\n• Rhetorical questions (Wouldn't you agree?)\n• Facts and statistics\n• Emotive language\n• Rule of three (unfair, unjust, unacceptable)\n• Counter-argument + rebuttal\n• Connectives: therefore, furthermore, consequently" },
  { topic:"Text Types", session:"Revision 36", q:"Features of a NON-CHRONOLOGICAL REPORT", a:"• Present tense · Factual and impersonal\n• Subheadings and paragraphs\n• Technical vocabulary\n• Third person (he, she, it, they)\n• NOT in time order\n• Facts, comparisons, and examples" },
  { topic:"Text Types", session:"Revision 36", q:"Features of INSTRUCTIONS", a:"• Imperative (command) verbs: Boil the water.\n• Numbered steps\n• Sequence adverbials: First, Then, Next, Finally\n• Clear, precise language\n• Second person (you)\n• Materials list at start" },
  { topic:"Text Types", session:"Revision 36", q:"Features of NARRATIVE (Fiction) writing", a:"• Characters and setting established early\n• A problem / conflict to resolve\n• Descriptive language (figurative, adjectives)\n• Dialogue in inverted commas\n• Usually past tense · First or third person\n• Strong opening and satisfying ending" },
  { topic:"Text Types", session:"Revision", q:"Structure of an ARGUMENT or DISCUSSION essay", a:"Introduction: introduce the issue clearly.\n\nPoint 1: strongest argument + evidence or example.\n\nPoint 2: second argument + evidence.\n\nCounter-argument: 'Some people argue that...' then REBUTTAL.\n\nConclusion: summarise + clear final viewpoint.\n\nKey connectives:\nFurthermore · However · Consequently\nNevertheless · In conclusion · To sum up" },
  // ── READING COMPREHENSION ──────────────────────────────────────────────────
  { topic:"Reading Comprehension", session:"Lesson 14F · Rev 35, 40", q:"What does INFERENCE mean in reading?", a:"Working out something SUGGESTED — not directly stated — using clues in the text.\n\nQuestion clues: 'What do you think…?', 'How do you know…?'\n\nMethod: Point → Quote → Explain" },
  { topic:"Reading Comprehension", session:"Revision 40", q:"What is the P-Q-E method?", a:"P = POINT: State your answer clearly.\n\nQ = QUOTE: Use evidence from the text.\n\nE = EXPLAIN: Explain why this evidence supports your point.\n\nExample:\nP: The character is nervous.\nQ: She 'twisted her hands together'.\nE: This suggests anxiety and worry." },
  { topic:"Reading Comprehension", session:"Revision 40", q:"RETRIEVAL vs INFERENCE — how do you tell the difference?", a:"RETRIEVAL = find the answer IN the text.\nClue words: 'According to the text...', 'Find ONE word that means...', 'What does the author say about...'\nStrategy: scan and locate.\n\nINFERENCE = read BETWEEN the lines.\nClue words: 'What do you think...', 'How do you know...', 'Explain why...'\nStrategy: use P–Q–E\n\nDifferent question → different method!" },
  // ── PARAGRAPHS AND COHESION ────────────────────────────────────────────────
  { topic:"Paragraphs & Cohesion", session:"Lesson 30F · Rev 40", q:"COHESIVE DEVICES for linking paragraphs", a:"Adding: Furthermore, In addition, Moreover, Also\n\nContrasting: However, On the other hand, In contrast, Nevertheless\n\nCause & effect: As a result, Therefore, Consequently\n\nTime: Meanwhile, Subsequently, Eventually\n\nSummarising: In conclusion, To sum up, Overall" },
  // ── GRAMMAR RULES ──────────────────────────────────────────────────────────
  { topic:"Grammar Rules", session:"Revision 41", q:"What is SUBJECT-VERB AGREEMENT?", a:"The verb must MATCH the subject in number.\n\nSingular subject → singular verb:\n  The dog runs fast. · She is happy.\n\nPlural subject → plural verb:\n  The dogs run fast. · They are happy." },
  { topic:"Grammar Rules", session:"Revision", q:"What are the 4 SENTENCE TYPES? Give one example of each.", a:"STATEMENT: gives information.\n  'The sun rises in the east.'\n\nQUESTION: asks something. Ends with ?\n  'Where does the sun rise?'\n\nCOMMAND: gives an instruction. Starts with a verb.\n  'Look at the sunrise.'\n\nEXCLAMATION: strong feeling. Must start with What/How and contain a verb.\n  'What a beautiful sunrise it is!' ✓\n\nAll 4 appear in 11+ exams!" },
];

let filtered = [];
let current = 0;
let isFlipped = false;
let activeMeta = null;

function buildTopicGrid() {
  const topics = [...new Set(ALL_CARDS.map(c => c.topic))];
  const grid = document.getElementById("topicGrid");
  grid.innerHTML = "";

  const allTile = document.createElement("div");
  allTile.className = "topic-tile all-tile";
  allTile.innerHTML = `<div class="tile-emoji">⭐</div><div class="tile-name">Practice All Topics</div><div class="tile-count">${ALL_CARDS.length} cards</div>`;
  allTile.onclick = () => enterTopic("__all__");
  grid.appendChild(allTile);

  topics.forEach(t => {
    const meta = TOPIC_META[t] || { emoji:"📚", g1:"#37474f", g2:"#546e7a" };
    const count = ALL_CARDS.filter(c => c.topic === t).length;
    const tile = document.createElement("div");
    tile.className = "topic-tile";
    tile.style.background = `linear-gradient(145deg, ${meta.g1}, ${meta.g2})`;
    tile.innerHTML = `<div class="tile-emoji">${meta.emoji}</div><div class="tile-name">${t}</div><div class="tile-count">${count} cards</div>`;
    tile.onclick = () => enterTopic(t);
    grid.appendChild(tile);
  });
}

function enterTopic(topic) {
  if (topic === "__all__") {
    filtered = [...ALL_CARDS];
    activeMeta = { emoji:"⭐", g1:"#1a1a3a", g2:"#2d2d60", d1:"#0d0d1e", d2:"#1a1a3a" };
    document.getElementById("cvTitle").textContent = "⭐ All Topics";
    document.getElementById("cvSub").textContent = ALL_CARDS.length + " cards";
  } else {
    filtered = ALL_CARDS.filter(c => c.topic === topic);
    activeMeta = TOPIC_META[topic] || { emoji:"📚", g1:"#37474f", g2:"#546e7a", d1:"#263238", d2:"#37474f" };
    document.getElementById("cvTitle").textContent = activeMeta.emoji + " " + topic;
    document.getElementById("cvSub").textContent = filtered.length + " card" + (filtered.length !== 1 ? "s" : "");
  }
  current = 0; isFlipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
  document.getElementById("progressBar").style.background = `linear-gradient(90deg, ${activeMeta.g1}, ${activeMeta.g2})`;
  document.getElementById("topicView").style.display = "none";
  document.getElementById("cardView").style.display = "block";
  renderCard();
}

function backToTopics() {
  document.getElementById("cardView").style.display = "none";
  document.getElementById("topicView").style.display = "block";
  isFlipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
}

function renderCard() {
  if (filtered.length === 0) {
    document.getElementById("cardProgress").textContent = "No cards";
    return;
  }
  const card = filtered[current];
  const meta = activeMeta;

  document.getElementById("cardFront").style.background = `linear-gradient(145deg, ${meta.g1}, ${meta.g2})`;
  document.getElementById("cardBack").style.background = `linear-gradient(145deg, ${meta.d1}, ${meta.d2})`;

  const cardMeta = TOPIC_META[card.topic] || { emoji:"📚" };
  const tagText = cardMeta.emoji + " " + card.topic;
  document.getElementById("frontTag").textContent = tagText;
  document.getElementById("backTag").textContent = tagText;
  document.getElementById("frontSession").textContent = card.session;
  document.getElementById("backSession").textContent = card.session;
  const funEmoji = FUN_EMOJIS[current % FUN_EMOJIS.length];
  document.getElementById("cardEmoji").textContent = cardMeta.emoji + " " + funEmoji;
  document.getElementById("cardQuestion").textContent = card.q;
  document.getElementById("cardAnswer").textContent = card.a;

  document.getElementById("cardProgress").textContent = "Card " + (current + 1) + " of " + filtered.length;
  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = current === filtered.length - 1;
  const pct = filtered.length > 1 ? (current / (filtered.length - 1)) * 100 : 100;
  document.getElementById("progressBar").style.width = pct + "%";
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById("cardInner").classList.toggle("flipped", isFlipped);
}

function navigate(dir) {
  const newIdx = current + dir;
  if (newIdx >= 0 && newIdx < filtered.length) {
    current = newIdx; isFlipped = false;
    document.getElementById("cardInner").classList.remove("flipped");
    renderCard();
  }
}

function shuffleCards() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  current = 0; isFlipped = false;
  document.getElementById("cardInner").classList.remove("flipped");
  renderCard();
}

document.addEventListener("keydown", e => {
  if (document.getElementById("cardView").style.display === "none") return;
  if (e.key === "ArrowRight") navigate(1);
  else if (e.key === "ArrowLeft") navigate(-1);
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  else if (e.key === "Escape") backToTopics();
});

// ── TOPIC SEARCH ─────────────────────────────────────────────────────────────
function handleSearch(val) {
  var q = val.trim().toLowerCase();
  var allTile = document.querySelector('.all-tile');
  var tiles = document.querySelectorAll('.topic-tile:not(.all-tile)');
  var visible = 0;
  tiles.forEach(function(tile) {
    var nameEl = tile.querySelector('.tile-name');
    var name = nameEl ? nameEl.textContent.toLowerCase() : '';
    var show = !q || name.includes(q);
    tile.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  if (allTile) allTile.style.display = q ? 'none' : '';
  var nr = document.getElementById('noResults');
  if (nr) nr.style.display = (q && visible === 0) ? 'block' : 'none';
}

buildTopicGrid();
</script>

<script>
// ── Enchanted Library Theme ───────────────────────────────────
(function() {
  const bg = document.getElementById('themeBg');

  // Firefly particles — green and gold dots
  const colours = ['#a8e6a3','#ffd54f','#80cbc4','#c8e6c9','#ffffff'];
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'theme-star';
    const sz = (Math.random() * 3 + 1).toFixed(1);
    const col = colours[Math.floor(Math.random() * colours.length)];
    s.style.cssText = `width:${sz}px;height:${sz}px;background:${col};top:${(Math.random()*100).toFixed(1)}%;left:${(Math.random()*100).toFixed(1)}%;animation-duration:${(Math.random()*3.5+1.5).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s;box-shadow:0 0 6px ${col};`;
    bg.appendChild(s);
  }

  // Floating enchanted library emojis — appended to fixed bg container
  const pool = ['📚','🦉','🪄','🔮','📖','✨','🌟','🦋','🌙','🍃','⭐','🌿','🕯️','🧙'];
  pool.forEach((em, i) => {
    const el = document.createElement('div');
    el.className = 'theme-float';
    const dur = (16 + Math.random() * 10).toFixed(1);
    el.style.cssText = `left:${((i / pool.length) * 100 + Math.random() * 3).toFixed(1)}%;font-size:${(1.2 + Math.random() * 0.8).toFixed(1)}em;animation-duration:${dur}s;animation-delay:${(Math.random() * parseFloat(dur)).toFixed(1)}s;`;
    el.textContent = em;
    bg.appendChild(el);
  });
})();
</script>
</body>
</html>
